services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sales_agent}
      POSTGRES_USER: ${POSTGRES_USER:-sales_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sales_agent_demo_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sales_agent} -d ${POSTGRES_DB:-sales_agent}"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    build: .
    env_file:
      - path: ${SERVICE_ENV_FILE:-.env}
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sales_agent}:${POSTGRES_PASSWORD:-sales_agent_demo_password}@db:5432/${POSTGRES_DB:-sales_agent}
    depends_on:
      db:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  api:
    build: .
    env_file:
      - path: ${SERVICE_ENV_FILE:-.env}
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sales_agent}:${POSTGRES_PASSWORD:-sales_agent_demo_password}@db:5432/${POSTGRES_DB:-sales_agent}
      DEMO_MODE: ${DEMO_MODE:-true}
      AI_PROVIDER: ${AI_PROVIDER:-stub}
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      MAIL_TRANSPORT: ${MAIL_TRANSPORT:-file}
      GMAIL_ADDRESS: "${GMAIL_ADDRESS:-}"
      GMAIL_APP_PASSWORD: "${GMAIL_APP_PASSWORD:-}"
      DINGTALK_TRANSPORT: ${DINGTALK_TRANSPORT:-log}
      DINGTALK_WEBHOOK_URL: "${DINGTALK_WEBHOOK_URL:-}"
      SAFE_MODE: ${SAFE_MODE:-true}
      AUTO_SEND_ENABLED: ${AUTO_SEND_ENABLED:-false}
      RECIPIENT_ALLOWLIST: ${RECIPIENT_ALLOWLIST:-internal@example.com}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-locally}
      RUNTIME_DIR: /app/runtime
      CONTENT_DIR: /app/config/content
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports: ["127.0.0.1:${API_PORT:-8000}:8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()"]
      interval: 3s
      timeout: 5s
      retries: 30
    restart: unless-stopped
    volumes:
      - type: bind
        source: ${RUNTIME_HOST_DIR:-./runtime}
        target: /app/runtime
      - type: bind
        source: ${ASSETS_HOST_DIR:-./assets}
        target: /app/assets
      - ./config:/app/config:ro

  worker:
    build: .
    env_file:
      - path: ${SERVICE_ENV_FILE:-.env}
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sales_agent}:${POSTGRES_PASSWORD:-sales_agent_demo_password}@db:5432/${POSTGRES_DB:-sales_agent}
      DEMO_MODE: ${DEMO_MODE:-true}
      AI_PROVIDER: ${AI_PROVIDER:-stub}
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      MAIL_TRANSPORT: ${MAIL_TRANSPORT:-file}
      GMAIL_ADDRESS: "${GMAIL_ADDRESS:-}"
      GMAIL_APP_PASSWORD: "${GMAIL_APP_PASSWORD:-}"
      DINGTALK_TRANSPORT: ${DINGTALK_TRANSPORT:-log}
      DINGTALK_WEBHOOK_URL: "${DINGTALK_WEBHOOK_URL:-}"
      SAFE_MODE: ${SAFE_MODE:-true}
      AUTO_SEND_ENABLED: ${AUTO_SEND_ENABLED:-false}
      RECIPIENT_ALLOWLIST: ${RECIPIENT_ALLOWLIST:-internal@example.com}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-locally}
      RUNTIME_DIR: /app/runtime
      CONTENT_DIR: /app/config/content
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "app.worker"]
    restart: unless-stopped
    volumes:
      - type: bind
        source: ${RUNTIME_HOST_DIR:-./runtime}
        target: /app/runtime
      - ./config:/app/config:ro

  imap:
    build: .
    env_file:
      - path: ${SERVICE_ENV_FILE:-.env}
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sales_agent}:${POSTGRES_PASSWORD:-sales_agent_demo_password}@db:5432/${POSTGRES_DB:-sales_agent}
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "app.imap_poller"]
    restart: unless-stopped
    volumes:
      - ./runtime:/app/runtime
      - ./config:/app/config:ro

volumes:
  postgres_data:
